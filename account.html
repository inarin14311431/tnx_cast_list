<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント // N◎VA CAST ARCHIVE</title>
  <link rel="stylesheet" href="./css/base.css?v=15">
  <link rel="stylesheet" href="./css/auth.css?v=15">
  <link rel="stylesheet" href="./css/account-ja.css?v=15">
  <link rel="stylesheet" href="./css/account-ux-v2.css?v=15">
  <link rel="stylesheet" href="./css/site-unified-v15.css?v=15">
</head>
<body>
  <div class="background-grid"></div><div class="scanlines"></div>
  <header class="auth-header"><a href="./index.html">&lt; キャスト一覧へ <small>RETURN TO ARCHIVE</small></a><p>N◎VA MUNICIPAL DATABASE</p><h1>オペレーターアカウント <small>OPERATOR ACCOUNT</small></h1></header>
  <main class="account-layout">
    <section class="account-panel">
      <p class="account-panel__label">認証済みオペレーター <small>AUTHENTICATED OPERATOR</small></p>
      <h2 id="account-email">読み込み中…</h2>
      <dl class="account-data"><div><dt>ユーザーID <small>USER ID</small></dt><dd id="account-user-id"></dd></div><div><dt>最終ログイン <small>LAST SIGN IN</small></dt><dd id="account-last-sign-in"></dd></div></dl>
      <div class="account-actions"><a href="./sheet.html"><span>新規キャスト作成</span><small>REGISTER NEW CAST</small></a><a href="./backup.html"><span>バックアップ／復元</span><small>BACKUP / RESTORE</small></a><a href="./index.html"><span>キャスト一覧</span><small>VIEW ARCHIVE</small></a><button id="logout-button" type="button"><span>ログアウト</span><small>TERMINATE SESSION</small></button></div>
    </section>
    <section class="account-panel"><header class="account-panel__header"><h2>登録キャスト <small>ASSIGNED CASTS</small></h2></header><div id="owned-casts">読み込み中…</div></section>
  </main>
  <script type="module" src="./js/account.js?v=15"></script>
  <script type="module" src="./js/account-status-labels.js?v=15"></script>
