<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>キャストデータ // N◎VA ARCHIVE</title>
  <link rel="stylesheet" href="./css/base.css?v=68">
  <link rel="stylesheet" href="./css/cast.css?v=68">
  <link rel="stylesheet" href="./css/session.css?v=68">
  <link rel="stylesheet" href="./css/cast-ja.css?v=68">
  <link rel="stylesheet" href="./css/cast-style-divine.css?v=71">
  <link rel="stylesheet" href="./css/cast-v3.css?v=68">
  <link rel="stylesheet" href="./css/ui-ja-v11.css?v=68">
  <link rel="stylesheet" href="./css/site-unified-v15.css?v=68">
  <link rel="stylesheet" href="./css/cast-overrides.css?v=68">
  <link rel="stylesheet" href="./css/ui-v25.css?v=68">
  <link rel="stylesheet" href="./css/responsive-v29.css?v=68">
  <link rel="stylesheet" href="./css/cast-style-editorlike-v49.css?v=68">
  <link rel="stylesheet" href="./css/cast-outfit-editorlike.css?v=68">
  <link rel="stylesheet" href="./css/cast-cyberscan.css?v=70">
  <link rel="stylesheet" href="./css/cast-archetype-view.css?v=68">
  <link rel="stylesheet" href="./css/cast-style-simple.css?v=73">
</head>
<body>
  <div class="background-grid"></div><div class="scanlines"></div>
  <header class="cast-header">
    <div class="cast-header__actions"><a class="cast-header__back" href="./index.html"><span>キャスト一覧へ</span><small>RETURN TO ARCHIVE</small></a><a id="cast-edit-button" class="cast-edit-link" hidden><span>キャストを編集</span><small>EDIT CAST</small></a></div>
    <p class="cast-header__system">N◎VA MUNICIPAL DATABASE</p>
    <p id="cast-status" class="cast-header__status">キャストデータへアクセス中…</p>
  </header>
  <main id="cast-content" class="cast-content" hidden>
    <section class="cast-hero">
      <div class="cast-hero__image-panel"><div class="cast-hero__image-frame"><img id="cast-image" src="./assets/placeholders/scan-failed.webp" alt=""><span class="cast-hero__image-scan"></span><div class="cast-hero__image-label">人物画像 <small>VISUAL IDENTITY</small></div></div></div>
      <div class="cast-hero__identity">
        <p id="cast-public-id" class="cast-public-id"></p><div class="cast-name-readings"><span id="cast-handle-kana" class="cast-handle-kana"></span><span id="cast-kana" class="cast-kana"></span></div><div class="cast-name-primary"><span id="cast-handle" class="cast-handle"></span><h1 id="cast-name" class="cast-name"></h1></div>
        <div id="cast-styles" class="cast-styles"></div>
        <section class="hero-divine-panel" aria-label="神業"><header><h2>神業 <small>DIVINE WORK</small></h2></header><div id="divine-list" class="divine-list hero-divine-list"></div></section>
        <dl class="identity-grid"><div><dt>プレイヤー</dt><dd id="cast-player"></dd></div><div><dt>所属</dt><dd id="cast-affiliation"></dd></div><div><dt>市民ランク</dt><dd id="cast-rank"></dd></div><div><dt>消費経験点</dt><dd id="cast-exp"></dd></div></dl>
        <p id="cast-summary" class="cast-summary"></p>
      </div>
    </section>
    <nav class="cast-tabs" aria-label="キャスト情報"><button class="cast-tab is-active" type="button" data-tab="session"><span>セッションデータ</span><small>SESSION DATA</small></button><button class="cast-tab" type="button" data-tab="profile"><span>プロフィール</span><small>PROFILE</small></button><button class="cast-tab" type="button" data-tab="outfits"><span>アウトフィット</span><small>OUTFITS</small></button></nav>
    <section id="tab-session" class="cast-tab-panel is-active" data-panel="session"><div class="data-layout"><section class="data-panel data-panel--wide"><header class="data-panel__header"><h2>能力値／制御値 <small>ABILITY / CONTROL</small></h2></header><div id="ability-grid" class="ability-grid"></div></section><section class="data-panel data-panel--wide"><header class="data-panel__header"><h2>技能 <small>SKILLS</small></h2></header><div id="skills-container"></div></section><section class="data-panel data-panel--wide"><header class="data-panel__header"><h2>コンボ <small>COMBOS</small></h2></header><div id="combo-container" class="combo-container"></div></section></div></section>
    <section id="tab-profile" class="cast-tab-panel" data-panel="profile"><div class="data-layout"><section class="data-panel"><header class="data-panel__header"><h2>パーソナルデータ <small>PERSONAL DATA</small></h2></header><dl id="personal-data" class="profile-list"></dl></section><section class="data-panel"><header class="data-panel__header"><h2>ライフパス <small>LIFE PATH</small></h2></header><dl id="life-path" class="profile-list"></dl></section><section class="data-panel data-panel--wide"><header class="data-panel__header"><h2>プロフィール <small>PROFILE</small></h2></header><div id="profile-text" class="profile-text"></div></section></div></section>
    <section id="tab-outfits" class="cast-tab-panel" data-panel="outfits"><div id="outfit-container" class="outfit-container"></div></section>
  </main>
  <section id="cast-error" class="cast-error" hidden><p class="cast-error__code">キャストデータが見つかりません <small>CAST DATA NOT FOUND</small></p><p id="cast-error-message"></p><a href="./index.html">キャスト一覧へ戻る</a></section>
  <script src="./js/cast-cyberscan.js?v=68"></script>
  <script type="module" src="./js/cast.js?v=68"></script>
  <script type="module" src="./js/cast-ui.js?v=69"></script>
  <script type="module" src="./js/ui-v25.js?v=68"></script>
  <script type="module" src="./js/cast-style-details-v47.js?v=68"></script>
  <script type="module" src="./js/cast-outfit-editorlike.js?v=68"></script>
  <script src="./js/cast-archetype-view.js?v=74"></script>
</body>
</html>
