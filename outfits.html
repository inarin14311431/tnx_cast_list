<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OUTFIT EDITOR // N◎VA ARCHIVE</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/outfits.css">
</head>

<body>
  <div class="background-grid"></div>
  <div class="scanlines"></div>

  <header class="auth-header">
    <a id="return-to-cast" href="./account.html">
      &lt; RETURN TO CAST
    </a>

    <p>N◎VA MUNICIPAL DATABASE</p>
    <h1>OUTFIT DATA EDITOR</h1>
  </header>

  <main class="outfit-editor-layout">
    <section class="outfit-editor-panel">
      <header class="outfit-editor-panel__header">
        <div>
          <p id="character-id">ACCESSING...</p>
          <h2 id="character-name">CAST DATA</h2>
        </div>

        <button id="add-outfit-button" type="button">
          + ADD OUTFIT
        </button>
      </header>

      <div id="outfit-message" class="outfit-message" aria-live="polite"></div>

      <div id="outfit-list" class="outfit-list">
        SCANNING OUTFIT DATA...
      </div>
    </section>
  </main>

  <dialog id="outfit-dialog" class="outfit-dialog">
    <form id="outfit-form" method="dialog">
      <header class="outfit-dialog__header">
        <div>
          <p>CAST OUTFIT DATABASE</p>
          <h2 id="outfit-dialog-title">ADD OUTFIT</h2>
        </div>

        <button id="close-dialog-button" type="button" aria-label="閉じる">
          ×
        </button>
      </header>

      <input id="outfit-id" name="id" type="hidden">

      <div class="outfit-form-grid">
        <label>
          <span>カテゴリー *</span>
          <select id="outfit-category" name="category" required>
            <option value="weapon">武器</option>
            <option value="armor">防具</option>
            <option value="cyberware">サイバーウェア</option>
            <option value="tron">トロン</option>
            <option value="vehicle">ヴィークル</option>
            <option value="residence">住居</option>
            <option value="other">その他</option>
          </select>
        </label>

        <label>
          <span>名称 *</span>
          <input id="outfit-name" name="name" type="text" maxlength="120" required>
        </label>

        <label>
          <span>購入値</span>
          <input id="purchase-value" name="purchase_value" type="text" maxlength="40">
        </label>

        <label>
          <span>常備化経験点</span>
          <input id="experience-cost" name="experience_cost" type="number" min="0" value="0">
        </label>

        <label>
          <span>隠匿</span>
          <input id="concealment" name="concealment" type="text" maxlength="40">
        </label>

        <label>
          <span>電制</span>
          <input id="electronic-control" name="electronic_control" type="text" maxlength="40">
        </label>

        <label>
          <span>部位</span>
          <input id="slot" name="slot" type="text" maxlength="80">
        </label>

        <label>
          <span>射程</span>
          <input id="outfit-range" name="range" type="text" maxlength="80">
        </label>

        <label>
          <span>攻撃力</span>
          <input id="attack" name="attack" type="text" maxlength="80">
        </label>

        <label>
          <span>防御力</span>
          <input id="defense" name="defense" type="text" maxlength="80">
        </label>

        <label>
          <span>表示順</span>
          <input id="sort-order" name="sort_order" type="number" min="0" value="0">
        </label>

        <label class="outfit-form-grid__wide">
          <span>解説</span>
          <textarea id="description" name="description" rows="6" maxlength="5000"></textarea>
        </label>
      </div>

      <footer class="outfit-dialog__actions">
        <button id="delete-outfit-button" type="button" class="danger" hidden>
          DELETE
        </button>

        <button id="cancel-outfit-button" type="button">
          CANCEL
        </button>

        <button id="save-outfit-button" type="submit">
          SAVE
        </button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="./js/outfits.js"></script>
</body>
</html>
