<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>編集画面へ移動中 // N◎VA ARCHIVE</title>
  <script>
    const target = new URL('./sheet.html', location.href);
    target.search = location.search;
    location.replace(target.href);
  </script>
</head>
<body>
  <p><a id="sheet-link" href="./sheet.html">キャストシート編集へ移動</a></p>
  <script>document.querySelector('#sheet-link').href = './sheet.html' + location.search;</script>
</body>
</html>
