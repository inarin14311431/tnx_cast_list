<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMAGE EDITOR // N◎VA ARCHIVE</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/image.css">
</head>

<body>
  <div class="background-grid"></div>
  <div class="scanlines"></div>

  <header class="auth-header">
    <a id="return-to-cast" href="./account.html">
      &lt; RETURN TO CAST
    </a>

    <p>N◎VA MUNICIPAL DATABASE</p>
    <h1>VISUAL IDENTITY EDITOR</h1>
  </header>

  <main class="image-editor-layout">
    <section class="image-editor-panel">
      <header class="image-editor-panel__header">
        <p id="character-id">ACCESSING...</p>
        <h2 id="character-name">CAST DATA</h2>
      </header>

      <div class="image-editor-grid">
        <section class="image-preview-panel">
          <div class="image-preview-frame">
            <img
              id="image-preview"
              src="./assets/placeholders/scan-failed.webp"
              alt="キャスト画像プレビュー"
            >
            <span class="image-preview-scan"></span>
          </div>

          <p id="image-file-info" class="image-file-info">
            NO IMAGE SELECTED
          </p>
        </section>

        <section class="image-control-panel">
          <h3>UPLOAD VISUAL DATA</h3>

          <form id="image-form">
            <label class="image-drop-zone" for="image-file">
              <span class="image-drop-zone__main">
                SELECT IMAGE FILE
              </span>
              <span class="image-drop-zone__sub">
                JPEG / PNG / WEBP・最大6MB
              </span>

              <input
                id="image-file"
                name="image"
                type="file"
                accept="image/jpeg,image/png,image/webp"
                required
              >
            </label>

            <div class="image-guidance">
              <p>推奨：縦長の立ち絵またはバストアップ</p>
              <p>一覧表示では中央を基準にトリミングされます。</p>
              <p>同じ画像の再登録でも新しいURLを発行します。</p>
            </div>

            <button id="upload-button" type="submit">
              UPLOAD AND APPLY
            </button>
          </form>

          <button id="clear-image-button" type="button">
            CLEAR IMAGE REFERENCE
          </button>
        </section>
      </div>

      <div id="image-message" class="image-message" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="./js/image.js"></script>
</body>
</html>
