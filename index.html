<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N◎VA CAST ARCHIVE</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/archive.css">
</head>
<body>
  <div class="background-grid"></div>
  <div class="scanlines"></div>
  <header class="site-header">
    <div class="site-header__top">
      <div>
        <p class="site-header__system">N◎VA MUNICIPAL DATABASE</p>
        <h1>N◎VA CAST ARCHIVE</h1>
      </div>
      <nav id="auth-navigation" class="auth-navigation" aria-label="アカウント">CHECKING SESSION...</nav>
    </div>
    <p id="status-text">CONNECTING...</p>
  </header>
  <main>
    <section class="archive-controls" aria-label="キャスト検索">
      <label class="archive-control archive-control--search"><span>SEARCH</span><input id="archive-search" type="search" placeholder="名前・ハンドル・PL・所属・概要" autocomplete="off"></label>
      <label class="archive-control"><span>STYLE</span><select id="archive-style-filter"><option value="">ALL STYLES</option></select></label>
      <label class="archive-control"><span>PLAYER</span><select id="archive-player-filter"><option value="">ALL PLAYERS</option></select></label>
      <label class="archive-control"><span>SORT</span><select id="archive-sort"><option value="updated-desc">UPDATED NEWEST</option><option value="updated-asc">UPDATED OLDEST</option><option value="name-asc">NAME A–Z</option><option value="name-desc">NAME Z–A</option><option value="exp-desc">EXP HIGH</option><option value="exp-asc">EXP LOW</option></select></label>
      <button id="archive-reset" type="button">RESET FILTER</button>
    </section>
    <section class="archive-summary"><p id="archive-result-count">0 CASTS SHOWN</p></section>
    <section id="cast-grid" class="cast-grid" aria-live="polite"></section>
  </main>
  <script type="module" src="./js/archive.js"></script>
</body>
</html>
