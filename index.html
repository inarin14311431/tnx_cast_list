<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N◎VA CAST ARCHIVE</title>
  <script src="./js/theme.js?v=5"></script>
  <link rel="stylesheet" href="./css/base.css?v=30">
  <link rel="stylesheet" href="./css/archive.css?v=30">
  <link rel="stylesheet" href="./css/ui-ja-v11.css?v=30">
  <link rel="stylesheet" href="./css/site-unified-v15.css?v=30">
  <link rel="stylesheet" href="./css/responsive-v29.css?v=30">
  <link rel="stylesheet" href="./css/archive-hero-v31.css?v=32">
  <link rel="stylesheet" href="./css/themes.css?v=1">
</head>
<body>
  <div class="background-grid"></div>
  <div class="scanlines"></div>
  <header class="site-header">
    <div class="site-header__top">
      <div>
        <p class="site-header__system">N◎VA MUNICIPAL DATABASE</p>
        <h1 class="site-title"><span class="site-title__nova">N◎VA</span><span class="site-title__divider" aria-hidden="true"></span><span class="site-title__archive">CAST ARCHIVE</span></h1>
      </div>
      <div class="site-header__operator">
        <nav id="auth-navigation" class="auth-navigation" aria-label="アカウント">ログイン状態を確認中…</nav>
        <label class="theme-picker">
          <span>表示テーマ <small>COLOR THEME</small></span>
          <select id="theme-select" data-theme-select aria-label="表示テーマ">
            <option value="nova">トーキョーＮ◎ＶＡ／夜</option>
            <option value="moon">オーサカＭ〇●Ｎ／昼</option>
            <option value="star">カムイＳＴ☆Ｒ／黄昏</option>
            <option value="eden">ミトラスE△EN／シンプル</option>
          </select>
        </label>
      </div>
    </div>
    <p id="status-text">データベースへ接続中…</p>
  </header>
  <main>
    <section class="archive-controls" aria-label="キャスト検索">
      <label class="archive-control archive-control--search"><span>検索 <small>SEARCH</small></span><input id="archive-search" type="search" placeholder="名前・ハンドル・PL・所属・概要" autocomplete="off"></label>
      <label class="archive-control"><span>スタイル <small>STYLE</small></span><select id="archive-style-filter"><option value="">すべてのスタイル</option></select></label>
      <label class="archive-control"><span>プレイヤー <small>PLAYER</small></span><select id="archive-player-filter"><option value="">すべてのプレイヤー</option></select></label>
      <label class="archive-control"><span>並び順 <small>SORT</small></span><select id="archive-sort"><option value="updated-desc">更新が新しい順</option><option value="updated-asc">更新が古い順</option><option value="name-asc">名前昇順</option><option value="name-desc">名前降順</option><option value="exp-desc">経験点が高い順</option><option value="exp-asc">経験点が低い順</option></select></label>
      <button id="archive-reset" type="button">検索条件をリセット <small>RESET</small></button>
    </section>
    <section class="archive-summary"><p id="archive-result-count">0件表示</p></section>
    <section id="cast-grid" class="cast-grid" aria-live="polite"></section>
  </main>
  <script type="module" src="./js/archive.js?v=32"></script>
</body>
</html>
