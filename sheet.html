<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CAST SHEET EDITOR // N◎VA ARCHIVE</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/sheet.css">
</head>
<body>
  <div class="background-grid"></div><div class="scanlines"></div>
  <header class="sheet-header">
    <a href="./account.html">&lt; RETURN TO ACCOUNT</a>
    <div><p>N◎VA MUNICIPAL DATABASE</p><h1>CAST SHEET EDITOR</h1></div>
    <div id="save-status">INITIALIZING...</div>
  </header>
  <main class="sheet-layout">
    <aside class="exp-panel">
      <p>EXPERIENCE POINTS</p><strong id="exp-total">0</strong>
      <dl id="exp-breakdown"></dl>
      <button id="save-button" type="button">SAVE NOW</button>
      <label>公開状態<select id="visibility"><option value="draft">DRAFT</option><option value="private">PRIVATE</option><option value="public">PUBLIC</option><option value="unlisted">UNLISTED</option><option value="archived">ARCHIVED</option></select></label>
    </aside>
    <section class="sheet-main">
      <section class="sheet-section is-open"><button class="section-toggle" type="button"><span>01 PROFILE / プロフィール</span></button><div class="section-body"><div class="form-grid">
        <label>キャスト名<input id="character-name" required></label><label>読み<input id="character-kana"></label><label>ハンドル<input id="handle"></label><label>プレイヤー名<input id="player-name" required></label><label>所属<input id="affiliation"></label><label>市民ランク<input id="citizen-rank"></label><label class="wide">概要<textarea id="summary" rows="3"></textarea></label><label class="wide">プロフィール<textarea id="profile" rows="7"></textarea></label>
      </div></div></section>
      <section class="sheet-section is-open"><button class="section-toggle" type="button"><span>02 STYLES / スタイル</span></button><div class="section-body"><div id="style-grid" class="style-grid"></div><div id="style-warning" class="warning"></div></div></section>
      <section class="sheet-section is-open"><button class="section-toggle" type="button"><span>03 ABILITY / 能力値・制御値・CS</span></button><div class="section-body"><div id="ability-grid" class="ability-grid"></div></div></section>
      <section class="sheet-section is-open"><button class="section-toggle" type="button"><span>04 SKILLS / 一般技能・スタイル技能</span></button><div class="section-body">
        <div class="toolbar"><button id="toggle-general" type="button">取得済みのみ表示</button><button id="add-general" type="button">+ 一般技能</button><button id="add-style-skill" type="button">+ スタイル技能</button><button id="import-skd" type="button">SKD TSV取込</button></div>
        <div id="general-skills"></div><div id="style-skills"></div>
      </div></section>
      <section class="sheet-section is-open"><button class="section-toggle" type="button"><span>05 OUTFITS / アウトフィット</span></button><div class="section-body"><div class="toolbar"><button id="add-outfit" type="button">+ アウトフィット</button><button id="import-ofc" type="button">OFC TSV取込</button></div><div id="outfit-list"></div></div></section>
    </section>
  </main>
  <dialog id="tsv-dialog"><form method="dialog"><h2 id="tsv-title">TSV IMPORT</h2><textarea id="tsv-text" rows="16"></textarea><div class="dialog-actions"><button value="cancel">CANCEL</button><button id="tsv-apply" value="default">IMPORT</button></div></form></dialog>
  <script type="module" src="./js/sheet.js"></script>
  <script type="module" src="./js/sheet-controls.js"></script>
  <script type="module" src="./js/sheet-recovery.js"></script>
</body>
</html>
