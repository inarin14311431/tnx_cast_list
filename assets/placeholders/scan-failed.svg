    <text x="400" y="430" fill="#78c9d6" font-size="22" letter-spacing="4">VISUAL IDENTITY NOT FOUND</text>
    <text x="400" y="505" fill="#ff6687" font-size="18" letter-spacing="3">ERROR CODE: NO_IMAGE_DATA</text>
  </g>
  <g stroke="#55e8ff" opacity=".45">
