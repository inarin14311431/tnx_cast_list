<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKILL EDITOR // N◎VA ARCHIVE</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/skills.css">
</head>

<body>
  <div class="background-grid"></div>
  <div class="scanlines"></div>

  <header class="auth-header">
    <a id="return-to-cast" href="./account.html">
      &lt; RETURN TO CAST
    </a>

    <p>N◎VA MUNICIPAL DATABASE</p>
    <h1>SKILL DATA EDITOR</h1>
  </header>

  <main class="skill-editor-layout">
    <section class="skill-editor-panel">
      <header class="skill-editor-panel__header">
        <div>
          <p id="character-id">ACCESSING...</p>
          <h2 id="character-name">CAST DATA</h2>
        </div>

        <button id="add-skill-button" type="button">
          + ADD SKILL
        </button>
      </header>

      <div id="skill-message" class="skill-message" aria-live="polite"></div>

      <div id="skill-list" class="skill-list">
        SCANNING SKILL DATA...
      </div>
    </section>
  </main>

  <dialog id="skill-dialog" class="skill-dialog">
    <form id="skill-form" method="dialog">
      <header class="skill-dialog__header">
        <div>
          <p>CAST SKILL DATABASE</p>
          <h2 id="skill-dialog-title">ADD SKILL</h2>
        </div>

        <button id="close-dialog-button" type="button" aria-label="閉じる">
          ×
        </button>
      </header>

      <input id="skill-id" name="id" type="hidden">

      <div class="skill-form-grid">
        <label>
          <span>カテゴリー *</span>
          <select id="skill-category" name="category" required>
            <option value="general">一般技能</option>
            <option value="social">社会</option>
            <option value="connection">コネ</option>
            <option value="style">スタイル技能</option>
          </select>
        </label>

        <label>
          <span>技能名 *</span>
          <input id="skill-name" name="name" type="text" maxlength="100" required>
        </label>

        <label>
          <span>レベル</span>
          <input id="skill-level" name="level" type="number" min="0" max="99" value="1">
        </label>

        <label>
          <span>表示順</span>
          <input id="skill-sort-order" name="sort_order" type="number" min="0" value="0">
        </label>
      </div>

      <fieldset class="suit-fieldset">
        <legend>判定能力</legend>

        <label><input id="skill-reason" name="reason" type="checkbox"> ♠ 理性</label>
        <label><input id="skill-passion" name="passion" type="checkbox"> ♣ 感情</label>
        <label><input id="skill-life" name="life" type="checkbox"> ♥ 生命</label>
        <label><input id="skill-mundane" name="mundane" type="checkbox"> ♦ 外界</label>
      </fieldset>

      <div class="skill-form-grid">
        <label>
          <span>タイミング</span>
          <input id="skill-timing" name="timing" type="text" maxlength="100">
        </label>

        <label>
          <span>対象</span>
          <input id="skill-target" name="target" type="text" maxlength="100">
        </label>

        <label>
          <span>射程</span>
          <input id="skill-range" name="range" type="text" maxlength="100">
        </label>

        <label>
          <span>目標値</span>
          <input id="skill-difficulty" name="difficulty" type="text" maxlength="100">
        </label>

        <label>
          <span>対決</span>
          <input id="skill-confrontation" name="confrontation" type="text" maxlength="100">
        </label>

        <label class="skill-form-grid__wide">
          <span>解説</span>
          <textarea id="skill-description" name="description" rows="5" maxlength="5000"></textarea>
        </label>
      </div>

      <footer class="skill-dialog__actions">
        <button id="delete-skill-button" type="button" class="danger" hidden>
          DELETE
        </button>

        <button id="cancel-skill-button" type="button">
          CANCEL
        </button>

        <button id="save-skill-button" type="submit">
          SAVE
        </button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="./js/skills.js"></script>
</body>
</html>
